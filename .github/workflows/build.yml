name: Android Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"(.*)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bridge-calculator-v${{ steps.get_version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Release APK (when tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Bridge Calculator v${{ steps.get_version.outputs.version }}
          body: |
            ## 桥架弯头计算器 v${{ steps.get_version.outputs.version }}（真 3D 渲染版）

            ### 新版亮点
            - **真 3D 实时渲染**：基于 SceneView 2.2.1 + Google Filament 引擎，OpenGL ES 真 3D
            - **6 种核心弯头程序化建模**：爬坡 / 水平 / 三通 / 变径 / 组合翻弯 / 折角
            - **触摸交互**：双指缩放 + 单指拖动旋转视角
            - **68 种弯头做法全覆盖**：万能公式 + 速算系数 + 多层多列偏移
            - **完全离线**：无网络依赖，所有计算本地完成

            ### 下载
            请下载下方的 `app-debug.apk` 文件（约 45MB），在 Android 设备上安装。

            ### 系统要求
            - Android 8.0+ (API 26+)
            - 约 60MB 存储空间（Filament 原生库较大）
            - 支持 64 位 (arm64-v8a) 设备
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
