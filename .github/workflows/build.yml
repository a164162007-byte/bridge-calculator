name: Android Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"(.*)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bridge-calculator-v${{ steps.get_version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Release APK (when tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Bridge Calculator v${{ steps.get_version.outputs.version }}
          body: |
            ## 桥架弯头计算器 v${{ steps.get_version.outputs.version }}

            ### 新版亮点（完全对齐陈工桥架计算器）

            **v1.1.4 — 三视图模式 + 陈工风格划线图**
            - **计算图**：砖墙障碍物 + 直角三角形 + a/b/c尺寸标注 + 角度标注 + 桥架宽度L + 下料参数，参数实时联动
            - **划线图**：桥架侧面视图 + 红色切口三角标记 + 起坡距离/切口深度尺寸线 + 3D线框预览，尺寸直接可套用施工
            - **3D模型**：真3D渲染（Filament引擎），支持旋转/缩放查看
            - **三Tab切换**：计算图 / 划线图 / 3D模型，一屏搞定从计算到施工的全部需求
            - **68种做法全覆盖**：爬坡/水平/三通/变径/组合翻弯/折角，各有专属计算图和划线图
            - **完全离线**：无网络依赖，所有计算本地完成

            ### 下载
            请下载下方的 `app-debug.apk` 文件（约 45MB），在 Android 设备上安装。

            ### 系统要求
            - Android 8.0+ (API 26+)
            - 约 60MB 存储空间（Filament 原生库较大）
            - 支持 64 位 (arm64-v8a) 设备
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
