name: Android Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"(.*)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bridge-calculator-v${{ steps.get_version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Release APK (when tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Bridge Calculator v${{ steps.get_version.outputs.version }}
          body: |
            ## 桥架弯头计算器 v${{ steps.get_version.outputs.version }}

            ### 新版亮点（对齐陈工桥架计算器）
            - **2D 下料展开图 v2**：浅蓝渐变背景，左侧侧面轮廓+右侧展开切割图，布局对齐陈工风格
            - **自动尺寸标注**：下料长、斜边、高度、底边等全部自动计算并标注（红色双箭头尺寸线+绿色大字数字）
            - **"下料"标签**：每个图形正上方居中显示"下料"标注，直观对应切割尺寸
            - **360° 旋转查看**：单指拖动旋转图纸，双击复位
            - **6 种核心弯头**：爬坡/水平/三通/变径/组合翻弯/折角，各有专属展开图（平行四边形/梯形/L形等）
            - **万能公式**：支持任意角度、多层偏移、变径、三通等 68 种做法
            - **完全离线**：无网络依赖，所有计算本地完成

            ### 下载
            请下载下方的 `app-debug.apk` 文件（约 45MB），在 Android 设备上安装。

            ### 系统要求
            - Android 8.0+ (API 26+)
            - 约 60MB 存储空间（Filament 原生库较大）
            - 支持 64 位 (arm64-v8a) 设备
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
