name: Android Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed -E 's/.*versionName[[:space:]]*=[[:space:]]*"(.*)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bridge-calculator-v${{ steps.get_version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Release APK (when tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: Bridge Calculator v${{ steps.get_version.outputs.version }}
          body: |
            ## 桥架弯头计算器 v${{ steps.get_version.outputs.version }}

            ### 新版亮点（完全对齐陈工桥架计算器）

            **v1.2.7 — 全面计算逻辑修正**
- 折弯位置公式修正：W/2-X/2→b/2-X/2（修复窄桥架负值问题）
- 14处切口宽修正：*0.3硬编码→calcCutWidth标准公式
- 组合翻弯总高度修正：H*2→实际爬坡高度
- 多层桥架总宽度/总高度修正
- 三通主管切口修正：W*0.3→W*0.5
            - **爬坡侧板切口深度**：从固定80%改为按实际比例 cutDepth/H（对齐陈工下料x公式）
            - **水平底板切口深度**：从固定60%改为按桥架宽度比例 cutDepth/W
            - **移除3D透视skew**：所有面板改为纯平面矩形展示，切口形状清晰可见
            - V切口从顶边和底边各一个，顶点对准折弯线

            **v1.2.2 — 标注修正 + 代码清理**
            - 水平弯头标注"起坡"改为"折弯位置"（水平弯头不涉及起坡概念）
            - 删除已废弃的 drawBottomPanel3D 死代码

            **v1.2.1 — 各弯头划线图独立区分**
            - 水平弯头：侧板不切割 + 底板V切口（切口在底板上）
            - 爬坡弯头：侧板V切口 + 底板不切割（切口在侧板上）
            - 每种类型标题加【】标识，底部汇总区分切口位置

            **v1.2.0 — 划线图对齐陈工原版**
            - **侧板+底板分离展示**：每个面板独立绘制，不再重叠
            - **完整尺寸标注**：起坡距离、剩余距离、切口宽度、切口深度全部用双箭头标出
            - **3D等轴测线框**：独立区域展示，两段桥架转折清晰可见
            - **关键尺寸汇总**：底部统一显示桥架规格、下料尺寸、角度信息

            **v1.1.9 — 计算图/划线图/3D模型全面修复**
            - **计算图**：按弯头类型显示对应示意图（水平俯视图/三通 T 形/变径过渡/组合翻弯双转折）
            - **划线图**：水平弯头增加侧板展开图，修复 3D 线框与底板重叠问题
            - **3D 模型**：相机距离从 2.2m 缩至 0.8m，模型长度从 0.4m 增至 0.6m，添加背景色消除黑屏

            **v1.1.8 — Tab切换稳定性修复**
            - **状态管理优化**：改用更稳定的 mutableStateOf，避免 Int 状态异常
            - **防御性编程**：when 表达式增加 else 兜底分支，防止意外值导致空白

            **v1.1.7 — Tab切换100%修复**
            - **Tab交互彻底修复**：移除无效的HorizontalPager依赖，改用mutableIntStateOf直接状态切换，划线图和3D模型Tab点击秒响应
            - **三Tab秒切**：计算图/划线图/3D模型，点击即切换，无任何延迟

            **v1.1.6 — 3D透视划线图，对齐陈工桥架计算器**
            - **划线图重写**：3D透视多面板展开图（侧板+底板+3D线框），红色三角切口+双箭头尺寸标注
            - **Tab交互修复**：修复划线图Tab点击无响应问题，三Tab统一布局
            - **计算图**：砖墙障碍物 + 直角三角形 + a/b/c尺寸标注 + 角度标注 + 下料参数，参数实时联动
            - **3D模型**：真3D渲染（Filament引擎），支持旋转/缩放查看
            - **68种做法全覆盖**：爬坡/水平/三通/变径/组合翻弯/折角，各有专属划线图
            - **完全离线**：无网络依赖，所有计算本地完成

            ### 下载
            请下载下方的 `app-debug.apk` 文件（约 45MB），在 Android 设备上安装。

            ### 系统要求
            - Android 8.0+ (API 26+)
            - 约 60MB 存储空间（Filament 原生库较大）
            - 支持 64 位 (arm64-v8a) 设备
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
