name: Android Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Get App Version
        id: get_version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | sed 's/.*versionName "\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 桥架计算器-v${{ steps.get_version.outputs.version }}-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Release APK (when tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: 桥架弯头计算器 v${{ steps.get_version.outputs.version }}
          body: |
            ## 桥架弯头计算器 v${{ steps.get_version.outputs.version }}

            ### 主要功能
            - 68种弯头做法全覆盖
            - 实时3D渲染（基于Google Filament）
            - 完全离线使用
            - 万能公式 + 速算系数
            - 多层/多列偏移计算

            ### 下载
            请下载下方的 `app-debug.apk` 文件，在Android设备上安装。

            ### 系统要求
            - Android 8.0+ (API 26+)
            - 约 30MB 存储空间
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
